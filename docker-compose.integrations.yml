# Bundled open-source HRM + CRM (self-hosted).
# Copy compose.integrations.env.example → compose.integrations.env, adjust passwords/ports, then:
#   docker compose -f docker-compose.integrations.yml --env-file compose.integrations.env up -d
#
# Horilla: https://hub.docker.com/r/horilla/horilla · EspoCRM: https://docs.espocrm.com/administration/docker/installation/

services:
  meit-hrm-db:
    image: postgres:16-bullseye
    environment:
      POSTGRES_DB: horilla
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MEIT_HRM_DB_PASSWORD:-meit_dev_hrm_pg}
    volumes:
      - meit-hrm-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  meit-hrm:
    image: horilla/horilla:1.4
    ports:
      - '${MEIT_HRM_PORT:-18080}:8000'
    environment:
      DATABASE_URL: postgres://postgres:${MEIT_HRM_DB_PASSWORD:-meit_dev_hrm_pg}@meit-hrm-db:5432/horilla
    depends_on:
      meit-hrm-db:
        condition: service_healthy
    command: >
      sh -c "until pg_isready -h meit-hrm-db -p 5432 -U postgres; do sleep 2; done &&
      python3 manage.py makemigrations &&
      python3 manage.py migrate &&
      python3 manage.py compilemessages &&
      gunicorn --bind 0.0.0.0:8000 horilla.wsgi:application"
    restart: unless-stopped

  meit-crm-db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: ${MEIT_CRM_DB_ROOT_PASSWORD:-meit_dev_crm_root}
      MARIADB_DATABASE: espocrm
      MARIADB_USER: espocrm
      MARIADB_PASSWORD: ${MEIT_CRM_DB_PASSWORD:-meit_dev_crm_db}
    volumes:
      - meit-crm-db:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 20s
      start_period: 20s
      timeout: 10s
      retries: 6
    restart: unless-stopped

  meit-crm:
    image: espocrm/espocrm:latest
    ports:
      - '${MEIT_CRM_PORT:-18081}:80'
    environment:
      ESPOCRM_DATABASE_PLATFORM: Mysql
      ESPOCRM_DATABASE_HOST: meit-crm-db
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: ${MEIT_CRM_DB_PASSWORD:-meit_dev_crm_db}
      ESPOCRM_ADMIN_USERNAME: ${MEIT_CRM_ADMIN_USER:-admin}
      ESPOCRM_ADMIN_PASSWORD: ${MEIT_CRM_ADMIN_PASSWORD:-ChangeMe_Admin_1}
      ESPOCRM_SITE_URL: ${MEIT_CRM_SITE_URL:-http://localhost:18081}
    depends_on:
      meit-crm-db:
        condition: service_healthy
    volumes:
      - meit-crm-app:/var/www/html
    restart: unless-stopped

volumes:
  meit-hrm-pg:
  meit-crm-db:
  meit-crm-app:
